<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Tempo & Grafico Valore</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f6fa;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .date-display { font-size: 1.2em; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
        .activity-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 10px; background: #ecf0f1; border-radius: 8px;
        }
        .svago-row { background: #fff3cd; border: 1px solid #ffeeba; }
        .activity-label { font-weight: bold; flex: 1; text-align: left; }
        input[type="number"] { width: 50px; padding: 5px; border-radius: 5px; border: 1px solid #bdc3c7; text-align: center; }
        button { padding: 12px 20px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; margin-top: 10px; }
        .btn-calcola { background-color: #27ae60; color: white; width: 100%; }
        .btn-back { background-color: #95a5a6; color: white; margin-bottom: 20px; }
        
        #chart-container { margin: 30px 0; height: 300px; }
        
        #risultato {
            margin: 20px 0; padding: 15px; background-color: #dff9fb;
            border: 2px solid #badc58; border-radius: 8px; display: none;
        }
        #valoreNettoDisplay { font-size: 2em; display: block; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .positive { color: #27ae60; font-weight: bold; }
        .negative { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <button class="btn-back" onclick="history.back()">🔙 Torna indietro</button>

    <div class="container">
        <h1>📊 Bilancio & Andamento</h1>
        <div class="date-display" id="dataOggi"></div>

        <div class="activity-row">
            <span class="activity-label">📚 Studio</span>
            <div><input type="number" id="studioH"> h : <input type="number" id="studioM"> m</div>
        </div>
        <div class="activity-row">
            <span class="activity-label">📖 Lettura</span>
            <div><input type="number" id="letturaH"> h : <input type="number" id="letturaM"> m</div>
        </div>
        <div class="activity-row">
            <span class="activity-label">🏋️ Allenamento</span>
            <div><input type="number" id="allenamentoH"> h : <input type="number" id="allenamentoM"> m</div>
        </div>
        <div class="activity-row svago-row">
            <span class="activity-label">🎮 Svago</span>
            <div><input type="number" id="svagoH"> h : <input type="number" id="svagoM"> m</div>
        </div>

        <button class="btn-calcola" onclick="calcolaESalva()">💾 Aggiorna Dati</button>

        <div id="risultato">
            <h3>Valore Odierno: <span id="valoreNettoDisplay"></span></h3>
        </div>

        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <div id="storicoContainer">
            <h3>📅 Storico</h3>
            <table id="tabellaStorico">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Produttività</th>
                        <th>Svago</th>
                        <th>Bilancio</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button onclick="pulisciStorico()" style="background-color: #c0392b; width: 100%; color: white; margin-top:10px;">🗑️ Reset Totale</button>
        </div>
    </div>

    <script>
        let myChart = null; // Variabile globale per il grafico

        // Inizializzazione
        document.getElementById('dataOggi').innerText = new Date().toLocaleDateString('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        caricaPagina();

        function formattaOrario(minuti) {
            const segno = minuti < 0 ? "-" : "+";
            const absMin = Math.abs(minuti);
            return `${segno}${Math.floor(absMin/60)}h ${String(absMin%60).padStart(2,'0')}m`;
        }

        function calcolaESalva() {
            const inputs = ['studioH','studioM','letturaH','letturaM','allenamentoH','allenamentoM','svagoH','svagoM'];
            const v = {};
            inputs.forEach(id => v[id] = parseInt(document.getElementById(id).value) || 0);

            const nuoviMinProd = (v.studioH*60 + v.studioM) + (v.letturaH*60 + v.letturaM) + (v.allenamentoH*60 + v.allenamentoM);
            const nuoviMinSvago = (v.svagoH*60 + v.svagoM);

            const dataCorrente = new Date().toLocaleDateString('it-IT');
            let storico = JSON.parse(localStorage.getItem('diarioSvago')) || [];
            const idx = storico.findIndex(item => item.data === dataCorrente);

            let minP = nuoviMinProd, minS = nuoviMinSvago;
            if (idx !== -1) {
                minP += storico[idx].rawProd || 0;
                minS += storico[idx].rawSvago || 0;
            }

            const record = {
                data: dataCorrente,
                tempoProd: formattaOrario(minP).replace('+',''),
                tempoSvago: formattaOrario(minS).replace('+',''),
                differenza: formattaOrario(minP - minS),
                rawValore: (minP - minS) / 60, // Salviamo in ore per il grafico
                rawProd: minP,
                rawSvago: minS
            };

            if (idx !== -1) storico[idx] = record; else storico.push(record);
            localStorage.setItem('diarioSvago', JSON.stringify(storico));
            
            document.getElementById('valoreNettoDisplay').innerText = record.differenza;
            document.getElementById('risultato').style.display = 'block';
            inputs.forEach(id => document.getElementById(id).value = '');
            
            caricaPagina();
        }

        function caricaPagina() {
            const storico = JSON.parse(localStorage.getItem('diarioSvago')) || [];
            aggiornaTabella(storico);
            aggiornaGrafico(storico);
        }

        function aggiornaTabella(storico) {
            const tbody = document.querySelector('#tabellaStorico tbody');
            tbody.innerHTML = '';
            [...storico].reverse().forEach((r, i) => {
                const tr = document.createElement('tr');
                const cl = r.rawValore > 0 ? "positive" : (r.rawValore < 0 ? "negative" : "");
                tr.innerHTML = `<td>${r.data}</td><td>${r.tempoProd}</td><td>${r.tempoSvago}</td><td class="${cl}">${r.differenza}</td>
                                <td><button onclick="eliminaRiga(${storico.length-1-i})" style="background:#e74c3c; color:white; padding:2px 8px; border-radius:4px;">X</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function aggiornaGrafico(storico) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            // Prendiamo gli ultimi 7 giorni per non affollare il grafico
            const ultimiDati = storico.slice(-7);
            const labels = ultimiDati.map(d => d.data.split('/')[0] + '/' + d.data.split('/')[1]);
            const valori = ultimiDati.map(d => d.rawValore);

            if (myChart) myChart.destroy(); // Distruggi il vecchio grafico prima di ricrearlo

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Valore Aggiunto (Ore)',
                        data: valori,
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(39, 174, 96, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 5,
                        pointBackgroundColor: valori.map(v => v >= 0 ? '#27ae60' : '#e74c3c')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: false,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            title: { display: true, text: 'Ore (+/-)' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function eliminaRiga(index) {
            let storico = JSON.parse(localStorage.getItem('diarioSvago'));
            storico.splice(index, 1);
            localStorage.setItem('diarioSvago', JSON.stringify(storico));
            caricaPagina();
        }

        function pulisciStorico() {
            if(confirm("Cancellare tutto?")) { localStorage.removeItem('diarioSvago'); caricaPagina(); }
        }
    </script>
</body>
</html>
