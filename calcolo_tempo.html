<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Tempo & Valore (Cumulativo)</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f6fa;
            padding: 20px;
            text-align: center;
        }
        h1, h2 { color: #333; }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .date-display {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .activity-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 8px;
        }
        .svago-row {
            background: #fff3cd;
            border: 1px solid #ffeeba;
        }
        .activity-label {
            font-weight: bold;
            flex: 1;
            text-align: left;
        }
        .time-inputs {
            flex: 2;
            text-align: right;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #bdc3c7;
            text-align: center;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-calcola { background-color: #27ae60; color: white; width: 100%; }
        .btn-calcola:hover { background-color: #219150; }
        .btn-back { background-color: #95a5a6; color: white; margin-bottom: 20px; }
        
        #risultato {
            margin-top: 20px;
            padding: 15px;
            background-color: #dff9fb;
            border: 2px solid #badc58;
            border-radius: 8px;
            display: none;
        }
        #risultato h3 { margin: 0; color: #2ecc71; }
        #valoreNettoDisplay { font-size: 2em; display: block; margin: 10px 0; font-weight: bold; }

        #storicoContainer { margin-top: 40px; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; color: white; border-radius: 4px; }
        
        .positive { color: #27ae60; font-weight: bold; }
        .negative { color: #e74c3c; font-weight: bold; }
        .neutral { color: #7f8c8d; }
    </style>
</head>
<body>

    <button class="btn-back" onclick="history.back()">🔙 Torna indietro</button>

    <div class="container">
        <h1>⚖️ Bilancio Produttività vs Svago</h1>
        <div class="date-display" id="dataOggi"></div>

        <div class="activity-row">
            <span class="activity-label">📚 Studio</span>
            <div class="time-inputs">
                <input type="number" id="studioH" placeholder="0" min="0"> h :
                <input type="number" id="studioM" placeholder="0" min="0" max="59"> m
            </div>
        </div>

        <div class="activity-row">
            <span class="activity-label">📖 Lettura</span>
            <div class="time-inputs">
                <input type="number" id="letturaH" placeholder="0" min="0"> h :
                <input type="number" id="letturaM" placeholder="0" min="0" max="59"> m
            </div>
        </div>

        <div class="activity-row">
            <span class="activity-label">🏋️ Allenamento</span>
            <div class="time-inputs">
                <input type="number" id="allenamentoH" placeholder="0" min="0"> h :
                <input type="number" id="allenamentoM" placeholder="0" min="0" max="59"> m
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

        <div class="activity-row svago-row">
            <span class="activity-label">🎮 Svago / Gioco</span>
            <div class="time-inputs">
                <input type="number" id="svagoH" placeholder="0" min="0"> h :
                <input type="number" id="svagoM" placeholder="0" min="0" max="59"> m
            </div>
        </div>

        <button class="btn-calcola" onclick="calcolaESalva()">💾 Aggiungi e Calcola</button>

        <div id="risultato">
            <h3>📊 Valore Totale Odierno:</h3>
            <span id="valoreNettoDisplay">0h 00m</span>
            <small id="dettaglioCalcolo"></small>
        </div>

        <div id="storicoContainer">
            <h3>📅 Storico Giorni Precedenti</h3>
            <table id="tabellaStorico">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Produttività</th>
                        <th>Gioco</th>
                        <th>Valore Aggiunto</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button onclick="pulisciStorico()" style="background-color: #c0392b; width: 100%; margin-top:10px; color: white;">🗑️ Cancella tutto lo storico</button>
        </div>
    </div>

    <script>
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const oggi = new Date();
        document.getElementById('dataOggi').innerText = oggi.toLocaleDateString('it-IT', options);
        
        caricaStorico();

        function convertiMinutiInStringa(minutiTotali) {
            const segno = minutiTotali < 0 ? "-" : "+";
            const absMinuti = Math.abs(minutiTotali);
            const ore = Math.floor(absMinuti / 60);
            const minuti = absMinuti % 60;
            const minFormat = minuti < 10 ? '0' + minuti : minuti;
            return `${segno}${ore}h ${minFormat}m`;
        }
        
        function formattaOrario(minutiTotali) {
            const ore = Math.floor(minutiTotali / 60);
            const minuti = minutiTotali % 60;
            const minFormat = minuti < 10 ? '0' + minuti : minuti;
            return `${ore}h ${minFormat}m`;
        }

        function calcolaESalva() {
            // 1. Recupera nuovi valori inseriti
            const sH = parseInt(document.getElementById('studioH').value) || 0;
            const sM = parseInt(document.getElementById('studioM').value) || 0;
            const lH = parseInt(document.getElementById('letturaH').value) || 0;
            const lM = parseInt(document.getElementById('letturaM').value) || 0;
            const aH = parseInt(document.getElementById('allenamentoH').value) || 0;
            const aM = parseInt(document.getElementById('allenamentoM').value) || 0;
            const gH = parseInt(document.getElementById('svagoH').value) || 0;
            const gM = parseInt(document.getElementById('svagoM').value) || 0;

            const nuoviMinutiProd = (sH * 60 + sM) + (lH * 60 + lM) + (aH * 60 + aM);
            const nuoviMinutiSvago = (gH * 60 + gM);

            // 2. Recupera storico esistente per sommare
            const dataCorrente = new Date().toLocaleDateString('it-IT');
            let storico = JSON.parse(localStorage.getItem('diarioSvago')) || [];
            const indiceOggi = storico.findIndex(item => item.data === dataCorrente);

            let minProdTotali = nuoviMinutiProd;
            let minSvagoTotali = nuoviMinutiSvago;

            // Se esiste già un record oggi, somma i vecchi minuti ai nuovi
            if (indiceOggi !== -1) {
                minProdTotali += storico[indiceOggi].rawProd || 0;
                minSvagoTotali += storico[indiceOggi].rawSvago || 0;
            }

            const differenzaTotale = minProdTotali - minSvagoTotali;

            // 3. Crea il nuovo record aggiornato
            const recordAggiornato = {
                data: dataCorrente,
                tempoProduttivo: formattaOrario(minProdTotali),
                tempoSvago: formattaOrario(minSvagoTotali),
                differenza: convertiMinutiInStringa(differenzaTotale),
                rawValore: differenzaTotale,
                rawProd: minProdTotali, // Salviamo i minuti grezzi per i calcoli futuri
                rawSvago: minSvagoTotali
            };

            if (indiceOggi !== -1) {
                storico[indiceOggi] = recordAggiornato;
            } else {
                storico.push(recordAggiornato);
            }

            // 4. Salva e Aggiorna UI
            localStorage.setItem('diarioSvago', JSON.stringify(storico));
            
            const display = document.getElementById('valoreNettoDisplay');
            display.innerText = recordAggiornato.differenza;
            display.style.color = differenzaTotale > 0 ? "#27ae60" : (differenzaTotale < 0 ? "#e74c3c" : "#333");
            
            document.getElementById('dettaglioCalcolo').innerText = `(Totale Produttività: ${recordAggiornato.tempoProduttivo} - Totale Gioco: ${recordAggiornato.tempoSvago})`;
            document.getElementById('risultato').style.display = 'block';

            // Pulisce i campi input per il prossimo inserimento
            document.querySelectorAll('input[type="number"]').forEach(input => input.value = '');
            
            caricaStorico(); 
        }

        function caricaStorico() {
            const storico = JSON.parse(localStorage.getItem('diarioSvago')) || [];
            const tbody = document.querySelector('#tabellaStorico tbody');
            tbody.innerHTML = ''; 

            // Copia l'array e invertilo per mostrare i più recenti in alto
            [...storico].reverse().forEach((record, index) => {
                const tr = document.createElement('tr');
                let classeColore = "neutral";
                if (record.rawValore > 0) classeColore = "positive";
                else if (record.rawValore < 0) classeColore = "negative";

                tr.innerHTML = `
                    <td>${record.data}</td>
                    <td>${record.tempoProduttivo}</td>
                    <td>${record.tempoSvago}</td>
                    <td class="${classeColore}">${record.differenza}</td>
                    <td><button class="btn-delete" onclick="eliminaRiga(${index})">❌</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function eliminaRiga(index) {
            let storico = JSON.parse(localStorage.getItem('diarioSvago')) || [];
            // Poiché lo storico visualizzato è invertito:
            const realIndex = storico.length - 1 - index;
            storico.splice(realIndex, 1);
            localStorage.setItem('diarioSvago', JSON.stringify(storico));
            caricaStorico();
        }

        function pulisciStorico() {
            if(confirm("Sei sicuro di voler cancellare tutto lo storico?")) {
                localStorage.removeItem('diarioSvago');
                caricaStorico();
                document.getElementById('risultato').style.display = 'none';
            }
        }
    </script>
</body>
</html>
